<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chitrali Alteration Tracker</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:#fff;
padding:12px;
box-shadow:0 3px 8px rgba(0,0,0,.1);
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:18px;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

input,select{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
width:100%;
}

button{
padding:8px 15px;
border:none;
background:#2563eb;
color:#fff;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
border-bottom:1px solid #ddd;
padding:8px;
}

th{
background:#f1f3f8;
}

.thumb{
width:60px;
height:60px;
border-radius:6px;
object-fit:cover;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modal img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<header>
<h1>Chitrali Alteration Tracker</h1>
</header>

<div class="container">

<div class="card">

<h3>Add Alteration Work</h3>

<div class="grid">

<input id="billNumber" placeholder="Bill Number">

<select id="itemName">
<option value="">Item Name</option>
<option>Lehenga</option>
<option>Croptop Skirt</option>
<option>Blouse</option>
<option>Ready to Wear Saree</option>
<option>Suit</option>
<option>Croptop Palazzo</option>
<option>Sharara</option>
<option>Gown</option>
<option>Saree Pleating</option>
<option>Indowestern</option>
</select>

<select id="tailorName">
<option value="">Tailor</option>
<option>Faisal</option>
<option>Salman</option>
<option>Imran</option>
<option>Rahul</option>
</select>

<input type="date" id="dateAssigned">

<input type="date" id="dateDelivery">

<select id="status">
<option value="PENDING">Pending</option>
<option value="IN_PROGRESS">In Progress</option>
<option value="DONE">Done</option>
</select>

<input type="file" id="imageInput" accept="image/*" capture="environment">

</div>

<br>

<button onclick="saveWork()">Save Work</button>

</div>

<div class="card">

<h3>Search</h3>

<div class="grid">

<input id="searchBill" placeholder="Bill No">

<select id="searchTailor">
<option value="">All Tailors</option>
<option>Faisal</option>
<option>Salman</option>
<option>Imran</option>
<option>Rahul</option>
</select>

<select id="searchStatus">
<option value="">All Status</option>
<option>PENDING</option>
<option>IN_PROGRESS</option>
<option>DONE</option>
</select>

<button onclick="loadData()">Search</button>

</div>

</div>

<div class="card">

<table>

<thead>

<tr>
<th>Image</th>
<th>Bill</th>
<th>Item</th>
<th>Tailor</th>
<th>Status</th>
<th>Delivery</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>

const API="https://your-render-backend-url.com";

async function compressImage(file){

return new Promise(resolve=>{

const img=new Image();
const reader=new FileReader();

reader.onload=e=>img.src=e.target.result;

img.onload=()=>{

const canvas=document.createElement("canvas");

const max=1280;

let w=img.width;
let h=img.height;

if(w>max){
h*=max/w;
w=max;
}

canvas.width=w;
canvas.height=h;

canvas.getContext("2d").drawImage(img,0,0,w,h);

canvas.toBlob(blob=>resolve(blob),"image/jpeg",0.7);

};

reader.readAsDataURL(file);

});

}

async function uploadImage(file){

const form=new FormData();
form.append("image",file);

const res=await fetch(API+"/upload",{
method:"POST",
body:form
});

return res.json();

}

async function saveWork(){

const file=document.getElementById("imageInput").files[0];

let imageUrl=null;
let thumbUrl=null;

if(file){

const compressed=await compressImage(file);

const upload=await uploadImage(compressed);

imageUrl=upload.imageUrl;
thumbUrl=upload.thumbUrl;

}

const payload={
billNumber:document.getElementById("billNumber").value,
itemName:document.getElementById("itemName").value,
tailorName:document.getElementById("tailorName").value,
dateAssigned:document.getElementById("dateAssigned").value,
dateDelivery:document.getElementById("dateDelivery").value,
status:document.getElementById("status").value,
imageUrl,
thumbUrl
};

await fetch(API+"/alterations",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

loadData();

}

async function loadData(){

const bill=document.getElementById("searchBill").value;
const tailor=document.getElementById("searchTailor").value;
const status=document.getElementById("searchStatus").value;

const res=await fetch(API+"/alterations");

const data=await res.json();

const tbody=document.getElementById("tableBody");

tbody.innerHTML="";

data
.filter(x=>
(!bill||x.bill_number.includes(bill)) &&
(!tailor||x.tailor_name===tailor) &&
(!status||x.status===status)
)
.forEach(x=>{

const tr=document.createElement("tr");

const img=x.thumb_url||x.image_url;

tr.innerHTML=`
<td>${img?`<img class="thumb" src="${img}" onclick="openImg('${x.image_url}')">`:"-"}</td>
<td>${x.bill_number}</td>
<td>${x.item_name}</td>
<td>${x.tailor_name}</td>
<td>${x.status}</td>
<td>${x.date_delivery||""}</td>
`;

tbody.appendChild(tr);

});

}

function openImg(src){

document.getElementById("modalImg").src=src;
document.getElementById("modal").style.display="flex";

}

loadData();

</script>

</body>
</html>
